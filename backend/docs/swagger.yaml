      - in: query
        maximum: 100
        minimum: 1
        name: limit
        required: true
        type: integer
      - in: query
        name: orderBy
        required: true
        type: string
      - enum:
        - ASC
        - DESC
        in: query
        name: orderDir
        required: true
        type: string
      - in: query
        minimum: 1

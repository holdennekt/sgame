        "401":
          description: 'Unauthorized: Session missing or expired'
          schema:
            $ref: '#/definitions/github_com_holdennekt_sgame_backend_internal_dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_holdennekt_sgame_backend_internal_dto.ErrorResponse'
      security:
      - CookieAuth: []
      summary: Create a new pack
      tags:
      - packs
  /packs/{id}:

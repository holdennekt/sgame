services:
  nginx:
    image: nginx:alpine3.23
    ports:
      - 3000:80
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: sgame-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: true
      BACKEND_HOST: backend

  backend:
    image: sgame-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - backend_go_mod:/go/pkg/mod
      - backend_go_build_cache:/root/.cache/go-build
    ports:
      - 8080:80
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/metrics"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    environment:
      APP_ENV: development
      HOST: 0.0.0.0
      PORT: 80
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_NAME: sgame
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USER: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      STORAGE_PROVIDER: minio
      BUCKET_NAME: attachments
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: false
      FRONTEND_URL: http://localhost:3000
      USER_AGENT: "SGame/1.0"
      TIME_TO_BET: 60
      TIME_TO_PASS: 60
      QUESTION_DEMO_DURATION: 5
      VALIDATOR_TYPE: ollama
      OLLAMA_URL: http://ollama:11434
      OLLAMA_SYSTEM_PROMPT: |-
        You are a quiz answer validator for a real-time multiplayer trivia game.

        You will receive a JSON object with:
          - "question_text": the question that was asked
          - "correct_answers": an array of accepted correct answers
          - "player_answer": the answer submitted by the player

        Your task: determine whether the player's answer is correct.

        Rules:
        - Accept semantically equivalent answers, translations, and transliterations across languages and alphabets (e.g. "квін" = "queen", "рхчп" = "RHCP", "парамор" = "Paramore")
        - Accept common abbreviations, alternate spellings, and partial names where unambiguous
        - Ignore case and minor punctuation differences
        - Reject answers that are vague, wrong, or only tangentially related
        - If the player's answer contains the correct answer among other words, consider it correct
        - Do not penalize for articles ("the", "a", "an")

        Respond ONLY with a valid JSON object in this exact format:
        {"is_correct": <true|false>, "confidence": <float between 0.0 and 1.0>}

        Use confidence < 0.6 only when the answer is genuinely ambiguous. Do not explain your reasoning.
      AI_VALIDATION_TIMEOUT: 10

  mongodb:
    image: mongo:6.0
    init: true
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_NAME}
    ports:
      - 27017:27017
    volumes:
      - mongodb_data_container:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    ports:
      - 6379:6379
    environment:
      REDIS_ARGS: "--user ${REDIS_USERNAME} allcommands allkeys allchannels on >${REDIS_PASSWORD} --notify-keyspace-events Ex"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: -1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull llama3.2:3b
        ollama run llama3.2:3b "hi"
    depends_on:
      ollama:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: on
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  redis_data:
  mongodb_data_container:
  minio_data:
  ollama_data:
  frontend_node_modules:
  backend_go_mod:
  backend_go_build_cache:
